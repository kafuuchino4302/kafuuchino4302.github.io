    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: white;
            font-family: "Microsoft YaHei", sans-serif; overflow: hidden;
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; align-items: center;
            justify-content: center; z-index: 1000; cursor: pointer; font-size: 1.5rem;
        }

        #main-container {
            display: none; height: 100vh; width: 100%;
            flex-direction: row; align-items: center;
            padding-left: 20%; box-sizing: border-box;
        }

        .left-column {
            display: flex; flex-direction: column; align-items: center;
            flex: 0 0 auto; margin-top: -60px;
        }

        #main-img {
            height: 70vh; width: auto; max-width: 60vw;
            border-radius: 4px; box-shadow: 0 0 40px rgba(255, 64, 129, 0.3);
            object-fit: contain;
        }

        .sub-btn-area {
            margin-top: 25px; height: 100px;
            display: flex; align-items: center; justify-content: center;
            gap: 20px; width: 100%;
        }

        .sub-btn {
            padding: 12px 25px; font-size: 1.1rem; cursor: pointer;
            background: transparent; border-radius: 4px; transition: all 0.3s;
            display: none;
        }

        .btn-blue { color: #40c4ff; border: 2px solid #40c4ff; }
        .btn-blue:hover { background: #40c4ff; color: #000; }
        .btn-orange { color: #ff9100; border: 2px solid #ff9100; }
        .btn-orange:hover { background: #ff9100; color: #000; }
        
        .btn-disabled {
            color: #555; border: 2px solid #333; cursor: not-allowed;
            opacity: 0.5;
        }

        .right-column {
            display: flex; flex-direction: column; gap: 40px;
            margin-left: 60px; width: 300px;
        }

        .action-btn {
            padding: 25px 40px; font-size: 1.4rem; color: #ff4081;
            background: rgba(0,0,0,0.6); border: 2px solid #ff4081;
            border-radius: 8px; cursor: pointer; transition: all 0.3s; text-align: center;
        }
        .action-btn:hover { background: #ff4081; color: #fff; }

        .hidden-space { visibility: hidden !important; pointer-events: none; }

    <script>
        let wrongCount = 0;
        const subBtnArea = document.getElementById('sub-btns');

        function clearBtns() { subBtnArea.innerHTML = ''; }

        function createBtn(text, className, onClick) {
            const btn = document.createElement('button');
            btn.innerText = text;
            btn.className = `sub-btn ${className}`;
            btn.style.display = 'block';
            if (onClick) btn.onclick = onClick;
            subBtnArea.appendChild(btn);
        }

        function stopAll() {
            const audios = document.querySelectorAll('audio');
            audios.forEach(a => { a.pause(); a.currentTime = 0; a.onended = null; });
        }

        function play(id, onEndFunc) {
            stopAll();
            const el = document.getElementById(id);
            if (onEndFunc) el.onended = onEndFunc;
            el.play().catch(e => console.log("播放被拦截"));
        }

        function start() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('main-container').style.display = 'flex';
            play('prologue', () => {
                createBtn('奥へ進む', 'btn-blue', () => { clearBtns(); phaseQuiz1(); });
            });
        }

        function phaseQuiz1() {
            play('quiz1', () => {
                createBtn('いる', 'btn-blue', () => { clearBtns(); phaseQuiz2(); });
                createBtn('いらない', 'btn-orange', () => { clearBtns(); wrongCount++; phasePunish1(); });
            });
        }

        function phasePunish1() {
            play('punishment1', () => {
                createBtn('いる', 'btn-blue', () => { clearBtns(); phaseQuiz2(); });
            });
        }

        function phaseQuiz2() {
            play('quiz2', () => {
                createBtn('0ではない', 'btn-blue', () => { clearBtns(); phaseQuiz3(); });
                createBtn('0', 'btn-orange', () => { clearBtns(); wrongCount++; phasePunish2(); });
            });
        }

        function phasePunish2() {
            play('punishment2', () => {
                createBtn('0ではない', 'btn-blue', () => { clearBtns(); phaseQuiz3(); });
            });
        }

        function phaseQuiz3() {
            play('quiz3', () => {
                createBtn('ならない', 'btn-blue', () => { clearBtns(); phaseQuiz4(); });
                createBtn('なる', 'btn-orange', () => { clearBtns(); wrongCount++; phasePunish3(); });
            });
        }

        function phasePunish3() {
            play('punishment3', () => {
                createBtn('ならない', 'btn-blue', () => { clearBtns(); phaseQuiz4(); });
            });
        }

        function phaseQuiz4() {
            play('quiz4', () => {
                clearBtns();
                for (let i = 0; i <= 3; i++) {
                    if (i === wrongCount) {
                        createBtn(i, 'btn-blue', () => { 
                            clearBtns(); 
                            play(`wrong${i}`, () => phaseFinalChoice()); 
                        });
                    } else {
                        createBtn(i, 'btn-disabled', null);
                    }
                }
            });
        }

        function phaseFinalChoice() {
            clearBtns();
            createBtn('右の道', 'btn-blue', () => {
                clearBtns();
                if (wrongCount >= 3) play('baka');
                else play(`reward${wrongCount}`);
            });
            createBtn('左の道', 'btn-orange', () => {
                clearBtns();
                if (wrongCount >= 3) play('baka');
                else play('seikan');
            });
        }

        function playFinal(id) {
            clearBtns();
            document.getElementById('end-btns').classList.add('hidden-space');
            play(id);
        }
    </script>
