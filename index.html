<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电视剧目录筛选</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: black;
            color: white;
        }
        .filter-container {
            margin-bottom: 20px;
        }
        .filter-category {
            margin-bottom: 10px;
        }
        .filter-category button {
            padding: 10px 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: white;
            color: black;
            cursor: pointer;
            margin-right: 10px;
            outline: none;
            transition: background-color 0.3s;
        }
        .filter-category button.active {
            background-color: pink;
            color: black;
        }
        .filter-category button:hover {
            background-color: yellow;
            color: black;
        }
        .tv-show-list {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            list-style-type: none;
            padding: 0;
        }
        .tv-show-list li {
            width: 200px;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background-color: white;
            color: black;
            text-align: center;
        }
        .tv-show-list img {
            width: 100%;
            height: auto;
        }
        .tv-show-list h3 {
            margin: 10px 0;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>电视剧目录筛选</h1>
    <div class="filter-container">
        <div class="filter-category">
            <button data-filter="type" data-value="" class="active">所有类型</button>
            <button data-filter="type" data-value="action">动作</button>
        </div>
        <div class="filter-category">
            <button data-filter="year" data-value="" class="active">所有年份</button>
            <button data-filter="year" data-value="2024">2024</button>
        </div>
        <div class="filter-category">
            <button data-filter="language" data-value="" class="active">所有语言</button>
            <button data-filter="language" data-value="english">英语</button>
        </div>
    </div>
    <ul class="tv-show-list" id="tvShowList">
        <li data-type="action" data-year="2024" data-language="english">
            <img src="preview1.jpg" alt="示例剧集 1">
            <h3>示例剧集 1</h3>
        </li>
        <li data-type="comedy" data-year="2023" data-language="chinese">
            <img src="preview2.jpg" alt="示例剧集 2">
            <h3>示例剧集 2</h3>
        </li>
    </ul>
    <script>
        let activeFilters = {
            type: '',
            year: '',
            language: ''
        };
        
        function setInitialFilters() {
            // Set initial active state for buttons
            document.querySelectorAll('.filter-container button').forEach(button => {
                if (button.getAttribute('data-value') === '') {
                    button.classList.add('active');
                }
            });
        }

        function applyActiveFilters() {
            document.querySelectorAll('.filter-container button').forEach(button => {
                const filterType = button.getAttribute('data-filter');
                const value = button.getAttribute('data-value');
                if (activeFilters[filterType] === value) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterShows() {
            const shows = document.querySelectorAll('#tvShowList li');
            shows.forEach(show => {
                const showType = show.getAttribute('data-type');
                const showYear = show.getAttribute('data-year');
                const showLanguage = show.getAttribute('data-language');
                const matchType = activeFilters.type === '' || showType === activeFilters.type;
                const matchYear = activeFilters.year === '' || showYear === activeFilters.year;
                const matchLanguage = activeFilters.language === '' || showLanguage === activeFilters.language;
                show.style.display = matchType && matchYear && matchLanguage ? '' : 'none';
            });
        }

        document.querySelectorAll('.filter-container button').forEach(button => {
            button.addEventListener('click', () => {
                const filterType = button.getAttribute('data-filter');
                const value = button.getAttribute('data-value');
                activeFilters[filterType] = value;
                applyActiveFilters();
                filterShows();
            });
        });

        // Initialize filter buttons
        setInitialFilters();
        filterShows();
    </script>
</body>
</html>
