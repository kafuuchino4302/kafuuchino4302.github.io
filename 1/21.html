<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码验证页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .input-field input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .button {
            background-color: #000;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .error {
            color: red;
            margin-top: 10px;
        }
        .content {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        #videoPlayer {
            width: 360px;
            height: 640px;
            margin: auto;
        }
    </style>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet">
</head>
<body>
    <div class="container" id="passwordContainer">
        <h1>请输入密码</h1>
        <p>此链接已加密，请验证后查看内容。</p>
        <div class="input-field">
            <input type="password" id="password" placeholder="请输入密码解锁">
        </div>
        <button class="button" onclick="validatePassword()">立即解锁</button>
        <div class="error" id="error-message">
            <h2>↓↓获取密码↓↓</h2>
            <p>长按图片保存到相册哦</p>
            <img src="../image/1.jpg" width="110">
        </div>
    </div>
    <div class="content" id="contentSection">
        <div>
            <video id="videoPlayer" class="video-js vjs-default-skin" controls></video>
            <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
            <script src="../../js/1.js"></script>
            <script>
                if (Hls.isSupported()) {
                    var video = document.getElementById('videoPlayer');
                    var hls = new Hls();
                    hls.loadSource('https://alsgp0.fds.api.xiaomi.com/user.images/20250417095743_342642.m3u8');
                    hls.attachMedia(video);
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = 'https://alsgp0.fds.api.xiaomi.com/user.images/20250417095743_342642.m3u8';
                }
            </script>
            <div style="text-align: center; margin-top: 20px;">
                <a href="https://qm.qq.com/q/w7KnS1D7Am" style="display: inline-block; padding: 10px 20px; background-color: #6A0DAD; color: white; text-decoration: none; border-radius: 5px;">
                点击这里加入组织
                </a>
            </div>
        </div>
    </div>
    <script src="../js/key.js"></script>
    <script>
        function validatePassword() {
            const passwordInput = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');
            const passwordContainer = document.getElementById('passwordContainer');
            const contentSection = document.getElementById('contentSection');

            if (passwordInput === PASSWORD) {
                passwordContainer.style.display = 'none';
                contentSection.style.display = 'block';
            } else {
                errorMessage.innerHTML = `
                    <p style="color: red;">密码错误，请重试！</p>
                    <h2>↓↓获取密码↓↓</h2>
                    <p>长按图片保存到相册哦</p>
                    <img src="../image/1.jpg" width="110">
                `;
            }
        }
    </script>
</body>
</html>
